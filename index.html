<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Termoidraulica - Interventi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h2>Nuovo Intervento</h2>
        <form id="formIntervento">
            <div class="form-group">
                <label for="nome">Nome Cliente / Ragione Sociale</label>
                <input type="text" id="nome" required placeholder="Es. Mario Rossi">
            </div>

            <div class="form-group">
                <label for="email">Email Cliente</label>
                <input type="email" id="email" placeholder="Es. mario@email.com">
            </div>

            <div class="form-group">
                <label for="indirizzo">Indirizzo Intervento</label>
                <input type="text" id="indirizzo" required placeholder="Es. Via Roma 10, Torino">
            </div>

            <div class="form-group">
                <label for="tipoGuasto">Richiesta Iniziale / Tipo di Guasto</label>
                <textarea id="tipoGuasto" rows="3" required placeholder="Es. Perdita d'acqua dalla caldaia..."></textarea>
            </div>

            <div class="form-group">
                <label for="lavoriEseguiti">Descrizione Lavori Eseguiti</label>
                <textarea id="lavoriEseguiti" rows="4" required placeholder="Es. Sostituita guarnizione..."></textarea>
            </div>

            <div class="form-group">
                <label for="materiali">Materiali Utilizzati</label>
                <textarea id="materiali" rows="3" placeholder="Es. 1x Valvola, 2x Guarnizioni..."></textarea>
            </div>

            <div class="form-group">
                <label for="oreLavoro">Ore di Manodopera</label>
                <input type="text" id="oreLavoro" placeholder="Es. 2 ore">
            </div>

            <div class="form-group">
                <label for="note">Note / Prossimi Interventi</label>
                <textarea id="note" rows="2" placeholder="Es. Tornare tra un mese per controllo..."></textarea>
            </div>

            <button type="submit" id="btnInvia">Salva e Invia PDF</button>
        </form>
        <div id="messaggioStato" class="hidden"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
